cat > render.yaml << 'EOF'
services:
  - type: web
    name: my-ai-api
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt && mkdir -p uploads
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: APP_NAME
        value: "My AI Hub API"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: "sqlite:///./myai.db"
      - key: UPLOAD_FOLDER
        value: "./uploads"
      - key: FREE_DAILY_IMAGE_GEN
        value: "10"
      - key: FREE_DAILY_IMAGE_EDIT
        value: "5"
      - key: FREE_DAILY_SONG_GEN
        value: "3"
      - key: MAX_FILE_SIZE_MB
        value: "10"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
EOF
