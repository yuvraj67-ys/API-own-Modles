services:
  - type: web
    name: my-ai-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_SECRET_KEY
        generateValue: true
      - key: HF_API_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        value: sqlite:///./myai.db
    disk:
      name: uploads
      mountPath: ./uploads
      sizeGB: 1